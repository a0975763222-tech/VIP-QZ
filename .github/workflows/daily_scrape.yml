name: Daily Price Scrape

on:
  schedule:
    # 每天早上 01:30 UTC (等於台灣時間 09:30) 執行
    - cron: '30 1 * * *'
  workflow_dispatch: # 這行很重要，讓我們可以手動點擊「Run workflow」測試

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝必要套件
        run: |
          pip install requests beautifulsoup4 firebase-admin

      - name: 執行報價抓取腳本
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          APP_ID: ${{ github.event.repository.name }}
        run: python iphone17_scraper.py
